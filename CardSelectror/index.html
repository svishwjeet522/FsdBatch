<!DOCTYPE html>
<html lang="en">
<head>
  <title>Card Selector</title>
  <style>
    .container {
      display: flex;
      gap: 10px;
    }
    .card {
      width: 150px;
      height: 100px;
      background: lightgray;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border-radius: 10px;
    }

    .active {
      background: orange;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>Select a Card</h2>

<div class="container">
  <div class="card">Card 1</div>
  <div class="card">Card 2</div>
  <div class="card">Card 3</div>
</div>

<script src="main.js"></script>
</body>
</html>
